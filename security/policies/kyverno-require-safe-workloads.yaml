apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-safe-workloads
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        message: "Container images must be pinned and must not use the latest tag."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - image: "!*:latest"
    - name: require-probes-and-resources
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        message: "Workloads must define resource requests/limits and liveness/readiness probes."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - resources:
                      requests:
                        cpu: "?*"
                        memory: "?*"
                      limits:
                        cpu: "?*"
                        memory: "?*"
                    livenessProbe:
                      httpGet:
                        path: "?*"
                        port: "?*"
                    readinessProbe:
                      httpGet:
                        path: "?*"
                        port: "?*"
