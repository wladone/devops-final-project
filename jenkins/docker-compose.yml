services:
  jenkins:
    build:
      context: .
    container_name: data-quality-jenkins
    user: root
    ports:
      - "${JENKINS_HTTP_PORT:-8080}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    environment:
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc_configs/jenkins.yaml
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin123!}
      KUBECONFIG: /workspace/data-quality-monitor/.tmp/jenkins-kubeconfig
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./casc:/var/jenkins_home/casc_configs:ro
      - ../:/workspace/data-quality-monitor
      - trivy_cache:/root/.cache/trivy
    restart: unless-stopped

  sonarqube:
    image: sonarqube:10.6-community
    container_name: data-quality-sonarqube
    ports:
      - "${SONARQUBE_HTTP_PORT:-9000}:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_WEB_JAVAOPTS: "-Xms512m -Xmx512m"
      SONAR_CE_JAVAOPTS: "-Xms256m -Xmx512m"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  trivy_cache:
