{{- if .Values.monitoring.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "data-quality-monitor.fullname" . }}-grafana-dashboard
  namespace: {{ .Values.monitoring.grafanaDashboard.namespace | default .Release.Namespace }}
  labels:
    {{- include "data-quality-monitor.labels" . | nindent 4 }}
    {{- range $key, $value := .Values.monitoring.grafanaDashboard.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    grafana_folder: {{ .Values.monitoring.grafanaDashboard.folder | quote }}
data:
  data-quality-monitor-overview.json: |
{{ .Files.Get "files/grafana-dashboard.json" | indent 4 }}
{{- end }}
