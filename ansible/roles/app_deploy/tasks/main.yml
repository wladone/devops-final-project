- name: Ensure application directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ app_dir }}"
    - "{{ app_dir }}/config"
    - "{{ app_dir }}/data"
    - "{{ app_dir }}/data/raw"
    - "{{ app_dir }}/reports"

- name: Copy quality rules
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../config/rules.yml"
    dest: "{{ app_dir }}/config/rules.yml"
    mode: "0644"

- name: Copy sample dataset
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../data/raw/sample_sales.csv"
    dest: "{{ app_dir }}/data/raw/sample_sales.csv"
    mode: "0644"

- name: Render deploy environment file
  ansible.builtin.template:
    src: app.env.j2
    dest: "{{ app_dir }}/.env"
    mode: "0600"

- name: Render production docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    mode: "0644"

- name: Pull the configured Docker image if available
  ansible.builtin.shell: "{{ docker_compose_command }} --env-file .env pull"
  args:
    chdir: "{{ app_dir }}"
  register: compose_pull
  changed_when: "'Pulling' in compose_pull.stdout or 'Downloaded' in compose_pull.stdout"
  failed_when:
    - compose_pull.rc != 0
    - "'pull access denied' not in compose_pull.stderr"
    - "'not found' not in compose_pull.stderr"

- name: Generate a fresh data quality report
  ansible.builtin.shell: "{{ docker_compose_command }} --env-file .env up --force-recreate --no-deps --abort-on-container-exit --exit-code-from data-quality-app data-quality-app"
  args:
    chdir: "{{ app_dir }}"
  register: data_quality_run
  # Report generation is this task's purpose, not a host state change. The
  # idempotency check (run the playbook twice, assert changed=0) treats this
  # as a no-op so it can catch real non-idempotent tasks elsewhere.
  changed_when: false

- name: Start or update the dashboard service
  ansible.builtin.shell: "{{ docker_compose_command }} --env-file .env up -d --remove-orphans dashboard"
  args:
    chdir: "{{ app_dir }}"
  register: compose_up
  changed_when: "'Started' in compose_up.stdout or 'Recreated' in compose_up.stdout or 'Creating' in compose_up.stdout"

- name: Wait for the dashboard to become reachable
  ansible.builtin.uri:
    url: "{{ dashboard_healthcheck_url | default('http://127.0.0.1:' ~ (dashboard_port | string)) }}"
    status_code: 200
  register: dashboard_check
  retries: 10
  delay: 3
  until: dashboard_check.status == 200
