- name: Verify Docker is already available when runtime management is disabled
  ansible.builtin.command: docker --version
  register: existing_docker
  changed_when: false
  when: not docker_runtime_manage_engine | bool

- name: Manage Docker runtime on the host
  when: docker_runtime_manage_engine | bool
  block:
    - name: Install OS packages required for Docker repository
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Map host architecture to Docker repository architecture
      ansible.builtin.set_fact:
        docker_apt_arch: "{{ docker_arch_map.get(ansible_architecture, ansible_architecture) }}"
      vars:
        docker_arch_map:
          x86_64: amd64
          aarch64: arm64
          armv7l: armhf

    - name: Ensure Docker keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker repository key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
