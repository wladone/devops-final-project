apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-quality-monitor-kind
  namespace: argocd
spec:
  project: data-quality-platform
  source:
    repoURL: git://gitops-repo.argocd.svc.cluster.local:9418/data-quality-monitor.git
    targetRevision: main
    path: helm/data-quality-monitor
    helm:
      releaseName: data-quality-monitor
      valueFiles:
        - values-kind-full.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dq-monitor-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
