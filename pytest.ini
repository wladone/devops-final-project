[pytest]
pythonpath = src
testpaths = tests
markers =
    unit: fast, isolated tests for individual functions
    property: Hypothesis-driven property tests
    integration: pipeline / multi-module flows
    cli: command-line interface contract tests
    perf: performance benchmarks (skipped in default runs)
    security: PII, YAML, CSV-injection, path-traversal checks
    infra: ansible / terraform / helm / docker / argocd validation
    e2e: end-to-end (Streamlit dashboard, docker compose)
    chaos: fault injection / resilience tests
filterwarnings =
    ignore::DeprecationWarning:pandas.*
