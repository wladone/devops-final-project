apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: data-quality-monitor-alerts
  namespace: monitoring
spec:
  groups:
    - name: data-quality-monitor.rules
      rules:
        - alert: DataQualityDashboardUnavailable
          expr: kube_deployment_status_replicas_available{namespace="dq-monitor-dev",deployment=~".*data-quality-monitor.*-dashboard"} < 1
          for: 5m
          labels:
            severity: critical
            service: data-quality-monitor
          annotations:
            summary: Dashboard deployment has no available replicas.
            description: The dashboard is unavailable for more than 5 minutes.
        - alert: DataQualityRunnerJobsFailing
          expr: increase(kube_job_status_failed{namespace="dq-monitor-dev",job_name=~".*data-quality-monitor.*-runner.*"}[30m]) > 2
          for: 5m
          labels:
            severity: warning
            service: data-quality-monitor
          annotations:
            summary: Data quality batch jobs are failing.
            description: More than two recent cronjob executions failed in the last 30 minutes.
        - alert: DataQualityPodsRestarting
          expr: increase(kube_pod_container_status_restarts_total{namespace="dq-monitor-dev",pod=~".*data-quality-monitor.*"}[30m]) > 4
          for: 10m
          labels:
            severity: warning
            service: data-quality-monitor
          annotations:
            summary: Containers are restarting too often.
            description: More than four restarts were observed within 30 minutes.
        - alert: DataQualityReportsVolumeFilling
          expr: kubelet_volume_stats_used_bytes{namespace="dq-monitor-dev",persistentvolumeclaim=~".*data-quality-monitor.*reports.*"} / kubelet_volume_stats_capacity_bytes{namespace="dq-monitor-dev",persistentvolumeclaim=~".*data-quality-monitor.*reports.*"} > 0.9
          for: 15m
          labels:
            severity: warning
            service: data-quality-monitor
          annotations:
            summary: Data quality reports volume is almost full.
            description: The reports PVC has been above 90 percent capacity for more than 15 minutes.
